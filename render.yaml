services:
  - type: web
    name: dermsight-api
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker server.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: dermsight
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
